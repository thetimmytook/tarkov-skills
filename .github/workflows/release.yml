name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Bump version in plugin manifest
        id: bump
        shell: pwsh
        run: |
          $manifestPath = ".claude-plugin/plugin.json"
          $manifest = Get-Content -Raw -LiteralPath $manifestPath | ConvertFrom-Json
          $parts = @($manifest.version -split '\.' | ForEach-Object { [int]$_ })
          switch ('${{ inputs.bump }}') {
            'major' { $parts[0]++; $parts[1] = 0; $parts[2] = 0 }
            'minor' { $parts[1]++; $parts[2] = 0 }
            default { $parts[2]++ }
          }
          $version = $parts -join '.'
          $manifest.version = $version
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath $manifestPath -Encoding UTF8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build benchmark app archive
        shell: pwsh
        run: ./build/build-release.ps1

      - name: Build codex skills archive
        shell: pwsh
        run: |
          $staging = Join-Path $env:RUNNER_TEMP "tarkov-skills"
          New-Item -ItemType Directory -Force $staging | Out-Null
          Copy-Item -Recurse -Path skills -Destination $staging
          Copy-Item -Path AGENTS.md, CLAUDE.md, README.md, LICENSE -Destination $staging
          Compress-Archive -Path $staging -DestinationPath "dist/tarkov-skills-codex.zip"

      - name: Open and merge version bump PR
        id: merge
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          # $ErrorActionPreference does not catch failures from native commands
          # (git, gh): a non-zero exit code alone does not stop the script, so
          # every step that must succeed is checked explicitly.
          function Invoke-Checked {
              param([string]$Description)
              if ($LASTEXITCODE -ne 0) {
                  throw "$Description failed with exit code $LASTEXITCODE"
              }
          }

          $version = "${{ steps.bump.outputs.version }}"
          $branch = "chore/release-v$version"

          # main is protected (PR required, no direct push, even for admins), so the
          # bump lands through a normal PR merge instead of a direct push.
          git config user.name "thetimmytook"
          git config user.email "timmytook.channel@gmail.com"
          git checkout -b $branch
          Invoke-Checked "git checkout -b $branch"
          git add .claude-plugin/plugin.json
          git commit -m "fix # BE # bump version to $version"
          Invoke-Checked "git commit"
          git push origin $branch
          Invoke-Checked "git push $branch"

          gh pr create --base main --head $branch --title "fix # BE # bump version to $version" --body ""
          Invoke-Checked "gh pr create"
          gh pr merge $branch --squash --delete-branch
          Invoke-Checked "gh pr merge"

          git checkout main
          Invoke-Checked "git checkout main"
          git pull --ff-only origin main
          Invoke-Checked "git pull main"

          # Belt-and-braces: refuse to tag/release a commit that does not
          # actually carry the version bump, even if every command above
          # reported success.
          $mergedVersion = (Get-Content -Raw ".claude-plugin/plugin.json" | ConvertFrom-Json).version
          if ($mergedVersion -ne $version) {
              throw "main is at version '$mergedVersion' after the merge, expected '$version'. The bump PR was not merged into main; refusing to tag."
          }

          git tag "v$version"
          Invoke-Checked "git tag"
          git push origin "v$version"
          Invoke-Checked "git push tag"

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" `
            "dist/TarkovBenchmarkApp.zip" `
            "dist/tarkov-skills-codex.zip" `
            --title "v${{ steps.bump.outputs.version }}" `
            --generate-notes
